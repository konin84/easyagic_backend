databases:
  - name: easy_agric_db
    plan: free
    databaseName: easy_agric_db
    user: easy_agric_db_user

services:
  - type: web
    name: easyagic_backend
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && python manage.py ensure_superuser && gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: easy_agric_db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_FIRST_NAME
        sync: false
      - key: DJANGO_SUPERUSER_LAST_NAME
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
